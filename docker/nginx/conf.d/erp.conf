# ─────────────────────────────────────────────────────────────────────────────
# Redirect HTTP → HTTPS
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Let's Encrypt challenge (renouvellement certificat)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tout le reste → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# Frontend Next.js — HTTPS
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name ${DOMAIN:-localhost};

    # ── Certificats SSL ───────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Protocoles et ciphers sécurisés (Mozilla Intermediate)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # ── En-têtes de sécurité ──────────────────────────────────────────────────
    include /etc/nginx/snippets/security-headers.conf;

    # ── Proxy vers Next.js ────────────────────────────────────────────────────
    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;

        # WebSocket / SSE support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;  # SSE : connexions longues
    }

    # ── Assets statiques Next.js (cache agressif) ─────────────────────────────
    location /_next/static/ {
        proxy_pass http://web:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# API NestJS — HTTPS (sous-domaine api. ou chemin /api)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.${DOMAIN:-localhost};

    # ── Certificats SSL ───────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    include /etc/nginx/snippets/security-headers.conf;

    # ── Rate limiting sur l'API ───────────────────────────────────────────────
    limit_req zone=api_limit burst=20 nodelay;
    limit_req_status 429;

    # ── Rate limiting renforcé sur le login ──────────────────────────────────
    location /api/v1/auth/login {
        limit_req zone=login_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── SSE Notifications (connexions longues) ────────────────────────────────
    location /api/v1/notifications/stream {
        proxy_pass http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header Connection '';      # Pas de keep-alive pour SSE
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;                 # Flush immédiat pour SSE
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # ── Toutes les autres routes API ──────────────────────────────────────────
    location / {
        proxy_pass http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeout API raisonnable
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Swagger docs (désactiver en prod si besoin) ───────────────────────────
    location /api/docs {
        proxy_pass http://api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
